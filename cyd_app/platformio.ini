[env]
platform = espressif32
board = esp32dev
framework = arduino
board_build.filesystem = littlefs
monitor_speed = 115200
lib_deps =
    lvgl/lvgl@^8.3.7
    bodmer/TFT_eSPI@^2.5.31
    bblanchon/ArduinoJson@^6.21.2
    https://github.com/tzapu/WiFiManager.git

build_flags =
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
    -D USER_SETUP_LOADED
    -D ILI9341_2_DRIVER
    -D TFT_INVERSION_ON
    -D TFT_RGB_ORDER=TFT_BGR
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D SPI_FREQUENCY=40000000

[env:cyd]
; Original MicroUSB CYD with XPT2046 SPI Touch
build_flags =
    ${env.build_flags}
    -D CYD_XPT2046
    -D TOUCH_CS=33
lib_deps =
    ${env.lib_deps}
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

[env:cyd2usb]
; USB-C / CYD2USB with GT911 I2C Touch
build_flags =
    ${env.build_flags}
    -D CYD2USB_GT911
lib_deps =
    ${env.lib_deps}
    tamctec/TAMC_GT911@^1.0.2

[env:cyd-v2-v3]
; CYD-USB-C (V2/V3 Hybrid) with both MicroUSB and USB-C
; Uses XPT2046 SPI Touch on a custom bus
build_flags =
    ${env.build_flags}
    -D CYD_V2_V3_XPT2046
    -D TOUCH_CS=33
    -D TOUCH_CLK=25
    -D TOUCH_DIN=32
    -D TOUCH_DOUT=39
lib_deps =
    ${env.lib_deps}
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
